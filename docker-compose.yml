services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: story
      POSTGRES_PASSWORD: story
      POSTGRES_DB: story_generator
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U story -d story_generator']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    # Pin to a specific release — https://github.com/minio/minio/releases
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - '9000:9000'
      - '9001:9001'   # MinIO web console — http://localhost:9001
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: story-generator-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://story:story@postgres:5432/story_generator
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: story-generator
      # Public URL used in image URLs returned to the browser (host-accessible MinIO)
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      PORT: '3001'
      OPENROUTER_TEXT_MODEL: ${OPENROUTER_TEXT_MODEL:-qwen/qwen-2.5-72b-instruct}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      REPLICATE_API_KEY: ${REPLICATE_API_KEY:-}
      REPLICATE_IMAGE_MODEL: ${REPLICATE_IMAGE_MODEL:-stability-ai/sdxl}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    image: story-generator-backend
    restart: unless-stopped
    command: ['node', 'dist/worker.js']
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://story:story@postgres:5432/story_generator
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: story-generator
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      OPENROUTER_TEXT_MODEL: ${OPENROUTER_TEXT_MODEL:-qwen/qwen-2.5-72b-instruct}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      REPLICATE_API_KEY: ${REPLICATE_API_KEY:-}
      REPLICATE_IMAGE_MODEL: ${REPLICATE_IMAGE_MODEL:-stability-ai/sdxl}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres-data:
  minio-data:
